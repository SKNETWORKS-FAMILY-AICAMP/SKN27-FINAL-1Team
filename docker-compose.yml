services:
    backend:
        build:
            context: .
            dockerfile: app/backend/Dockerfile
        container_name: bobbeori_backend
        restart: unless-stopped
        ports:
            - "${SERVER_PORT:-8000}:8000"
        env_file:
            - .env
        environment:
            DB_HOST: postgres
            NEO4J_URI: bolt://neo4j:7687
        depends_on:
            postgres:
                condition: service_healthy
            neo4j:
                condition: service_started
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/'')" || exit 1',
                ]
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 15s

    frontend:
        build:
            context: ./app/frontend
            dockerfile: Dockerfile
        container_name: bobbeori_frontend
        restart: unless-stopped
        ports:
            - "5173:5173"
        environment:
            VITE_API_URL: http://localhost:${SERVER_PORT:-8000}
        depends_on:
            backend:
                condition: service_healthy

    postgres:
        image: postgres:15
        container_name: bobbeori_postgres
        restart: unless-stopped
        ports:
            - "${DB_PORT:-5432}:5432"
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - ./storage/postgres/data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
            interval: 10s
            timeout: 10s
            retries: 5

    neo4j:
        image: neo4j:latest
        container_name: bobbeori_neo4j
        restart: unless-stopped
        ports:
            - "7474:7474"
            - "7687:7687"
        environment:
            - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
            - NEO4J_PLUGINS=["apoc", "graph-data-science"]
            - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
            - NEO4J_dbms_memory_heap_initial__size=512m
            - NEO4J_dbms_memory_heap_max__size=2G
            - NEO4J_dbms_memory_pagecache_size=1G
        volumes:
            - ./storage/neo4j/backups/neo4j_data:/data
            - ./storage/neo4j/backups/neo4j_logs:/logs
            - ./storage/neo4j/import:/var/lib/neo4j/import
            - ./storage/neo4j/backups/neo4j_plugins:/plugins