#       - DB_HOST=postgres
#     depends_on:
#       - postgres
#       - neo4j

#   postgres:
#     image: postgres:15
#     ports:
#       - "5432:5432"

    neo4j:
        image: neo4j:5.12
        container_name: neo4j
        ports:
            - "7474:7474"
            - "7687:7687"
        environment:
            - NEO4J_AUTH=neo4j/YOUR_SECURE_NEO4J_PASSWORD_HERE
            - NEO4J_PLUGINS=["apoc", "graph-data-science"]
            - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
            - NEO4J_dbms_memory_heap_initial__size=512m
            - NEO4J_dbms_memory_heap_max__size=2G
            - NEO4J_dbms_memory_pagecache_size=1G
        volumes:
            - ./storage/neo4j/backups/neo4j_data:/data                      # 데이터베이스 데이터 저장 (그래프 데이터가 여기 저장됨)
            - ./storage/neo4j/backups/neo4j_logs:/logs                      # 로그 파일 저장
            - ./storage/neo4j/backups/neo4j_import:/var/lib/neo4j/import    # CSV 등 임포트 파일을 넣을 위치
            - ./storage/neo4j/backups/neo4j_plugins:/plugins                # 플러그인 파일 저장