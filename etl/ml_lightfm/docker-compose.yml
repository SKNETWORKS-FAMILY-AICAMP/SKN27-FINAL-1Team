name: ml-lightfm

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_lightfm_jupyter
    restart: unless-stopped
    env_file: .env
    ports:
      - "8888:8888"
    volumes:
      - ${MOUNT_PROJECT}:${CONTAINER_PROJECT}
    working_dir: ${CONTAINER_PROJECT}
    environment:
      LIGHTFM_RUNTIME: linux-docker
      PROJECT_ROOT: ${CONTAINER_PROJECT}
