name: deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
  ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || 'bobbeori.com' }}
  FRONTEND_HOST: ${{ vars.FRONTEND_HOST || 'www.bobbeori.com' }}
  HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
  COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
  CHATGPT_CALLBACK_URLS: ${{ vars.CHATGPT_CALLBACK_URLS }}
  CODEX_CALLBACK_URLS: ${{ vars.CODEX_CALLBACK_URLS }}
  EXTERNAL_SECRET_NAME: ${{ vars.EXTERNAL_SECRET_NAME || 'bobbeori/prod/external' }}
  OPENAI_APPS_CHALLENGE_TOKEN: ${{ secrets.OPENAI_APPS_CHALLENGE_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          for name in AWS_ROLE_ARN HOSTED_ZONE_ID COGNITO_DOMAIN_PREFIX CHATGPT_CALLBACK_URLS CODEX_CALLBACK_URLS; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: infra/requirements.txt

      - name: Load frontend public config
        shell: bash
        run: |
          aws secretsmanager get-secret-value \
            --secret-id "$EXTERNAL_SECRET_NAME" \
            --query SecretString \
            --output text > /tmp/bobbeori-external.json

          KAKAO_CLIENT_ID="$(jq -r '.KAKAO_CLIENT_ID // empty' /tmp/bobbeori-external.json)"
          NAVER_CLIENT_ID="$(jq -r '.NAVER_CLIENT_ID // empty' /tmp/bobbeori-external.json)"
          GOOGLE_CLIENT_ID="$(jq -r '.GOOGLE_CLIENT_ID // empty' /tmp/bobbeori-external.json)"
          GA_MEASUREMENT_ID="$(jq -r '.GA_MEASUREMENT_ID // empty' /tmp/bobbeori-external.json)"

          for name in KAKAO_CLIENT_ID NAVER_CLIENT_ID GOOGLE_CLIENT_ID GA_MEASUREMENT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing from $EXTERNAL_SECRET_NAME"
              exit 1
            fi
            echo "::add-mask::${!name}"
          done

          {
            echo "VITE_API_URL=https://api.${ROOT_DOMAIN}"
            echo "VITE_OAUTH_REDIRECT_ORIGIN=https://${FRONTEND_HOST}"
            echo "VITE_KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID"
            echo "VITE_NAVER_CLIENT_ID=$NAVER_CLIENT_ID"
            echo "VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            echo "VITE_GA_MEASUREMENT_ID=$GA_MEASUREMENT_ID"
          } >> "$GITHUB_ENV"

      - name: Build frontend
        working-directory: app/frontend
        run: |
          npm ci
          npm run build

      - name: Test backend
        env:
          DEV_MODE: "true"
          JWT_SECRET_KEY: ci-test-secret
          OPENAI_API_KEY: ""
          RUNPOD_CALENDAR_SERVERLESS_URL: ""
          RUNPOD_API_KEY: ""
          RUNPOD_INTERNAL_TOKEN: ""
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/backend/requirements.txt
          python -m pytest -q

      - name: Install CDK dependencies
        working-directory: infra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Deploy CDK stack
        working-directory: infra
        run: |
          npx --yes aws-cdk@2 deploy Bobbeori-prod \
            --require-approval never \
            -c environment=prod \
            -c root_domain="$ROOT_DOMAIN" \
            -c frontend_host="$FRONTEND_HOST" \
            -c hosted_zone_id="$HOSTED_ZONE_ID" \
            -c cognito_domain_prefix="$COGNITO_DOMAIN_PREFIX" \
            -c chatgpt_callback_urls="$CHATGPT_CALLBACK_URLS" \
            -c codex_callback_urls="$CODEX_CALLBACK_URLS" \
            -c external_secret_name="$EXTERNAL_SECRET_NAME" \
            -c openai_apps_challenge_token="$OPENAI_APPS_CHALLENGE_TOKEN" \
            -c frontend_dist_path="$GITHUB_WORKSPACE/app/frontend/dist"

      - name: Smoke test production
        shell: bash
        run: |
          retry() {
            local url="$1"
            for i in {1..12}; do
              if curl --fail --silent --show-error --location "$url" > /dev/null; then
                echo "OK $url"
                return 0
              fi
              sleep 10
            done
            echo "::error::Smoke test failed: $url"
            return 1
          }

          retry "https://${FRONTEND_HOST}/"
          retry "https://api.${ROOT_DOMAIN}/docs"
          retry "https://mcp.${ROOT_DOMAIN}/.well-known/oauth-protected-resource"
