name: feature_deploy CI

on:
  push:
    branches:
      - feature_deploy
  pull_request:
    branches:
      - feature_deploy

concurrency:
  group: feature-deploy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/frontend

    env:
      VITE_API_URL: https://api.bobbeori.com
      VITE_OAUTH_REDIRECT_ORIGIN: https://www.bobbeori.com
      VITE_KAKAO_CLIENT_ID: ci-kakao-client-id
      VITE_NAVER_CLIENT_ID: ci-naver-client-id
      VITE_GOOGLE_CLIENT_ID: ci-google-client-id

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  cdk-synth:
    runs-on: ubuntu-latest

    env:
      CDK_DEFAULT_ACCOUNT: "000000000000"
      CDK_DEFAULT_REGION: ap-northeast-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: infra/requirements.txt

      - name: Install CDK Python dependencies
        working-directory: infra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create CI CDK context
        working-directory: infra
        run: |
          cat > cdk.context.json <<'JSON'
          {
            "availability-zones:account=000000000000:region=ap-northeast-2": [
              "ap-northeast-2a",
              "ap-northeast-2b"
            ],
            "availability-zones:account=000000000000:region=us-east-1": [
              "us-east-1a",
              "us-east-1b"
            ]
          }
          JSON

      - name: CDK synth
        working-directory: infra
        run: |
          npx --yes aws-cdk@2 synth --no-lookups \
            -c environment=ci \
            -c root_domain=bobbeori.com \
            -c hosted_zone_id=Z000000000000000000000 \
            -c cognito_domain_prefix=bobbeori-ci \
            -c chatgpt_callback_urls=https://chatgpt.com/connector/oauth/ci \
            -c codex_callback_urls=http://localhost:1455/oauth/callback
