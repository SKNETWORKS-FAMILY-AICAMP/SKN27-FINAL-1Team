name: pytest

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - "feature/**"

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DEV_MODE: "true"
      JWT_SECRET_KEY: "ci-test-secret"
      OPENAI_API_KEY: ""
      RUNPOD_CALENDAR_SERVERLESS_URL: ""
      RUNPOD_API_KEY: ""
      RUNPOD_INTERNAL_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/backend/requirements.txt

      - name: Run tests
        run: python -m pytest -q
