interface:
  display_name: "Bobbeori Workflows"
  short_description: "Safe Bobbeori MCP preview and confirmation flows"
  default_prompt: "Use $bobbeori-workflows with the connected bobbeori MCP to inspect my food data and preview any write before asking me to confirm it."

dependencies:
  tools:
    - type: "mcp"
      value: "bobbeori"
      description: "Authenticated Bobbeori inventory, receipt, shopping, recipe, calendar, and reminder tools"
      transport: "streamable_http"
      url: "https://mcp.bobbeori.com/mcp"

policy:
  allow_implicit_invocation: false
